<script>
window.handleSheet = function(json){
  const rows = json.table.rows || [];
  const board = document.getElementById('board');

  if(!rows.length){
    board.innerHTML = '<div class="empty">記事がありません</div>';
    return;
  }

  let items = [];

  rows.forEach((r, index) => {
    const c = r.c || [];

    // 各項目の取得（存在しない場合に備えて空文字をデフォルトに）
    const dateText = normalize(c[0]?.v);
    const title    = normalize(c[1]?.v) || "無題のお知らせ"; // タイトルがないとシェアが崩れるため
    const detail   = normalize(c[3]?.v);
    const applyUrl = normalize(c[4]?.v);
    const pageUrl  = normalize(c[5]?.v);
    const mediaUrl = normalize(c[6]?.v);
    
    // 11列目(c[10])がなくても動作するようにデフォルト値を設定
    const sortNum  = (c[10] && typeof c[10].v === 'number') ? c[10].v : 0;

    const id = index + 1;

    items.push({
      id, dateText, title, detail, applyUrl, pageUrl, mediaUrl, sortNum
    });
  });

  // 並び替え（エラー防止のため数値で比較）
  items.sort((a, b) => b.sortNum - a.sortNum);

  const targetId = getParam('id');
  let html = '';

  items.forEach(item => {
    // シェア用URLの生成
    const shareUrl = APP_URL + '?id=' + item.id;

    html += `
      <div class="card" id="post-${item.id}">
        <div class="date">${escapeHtml(item.dateText)}</div>
        <div class="title">${escapeHtml(item.title)}</div>
        ${item.mediaUrl ? `<div class="media-scroll">${createMedia(item.mediaUrl)}</div>` : ''}
        <div class="detail">${escapeHtml(item.detail)}</div>

        <div class="btns">
          ${item.pageUrl ? `<a class="btn home-btn" href="${item.pageUrl}" target="_blank">市ホームページ</a>` : ''}
          ${item.applyUrl ? `<a class="btn apply-btn" href="${item.applyUrl}" target="_blank">申込みはこちら</a>` : ''}
        </div>

        <!-- ここで確実にボタンを生成 -->
        ${buildShareButtons(shareUrl, item.title, item.id)}
      </div>
    `;
  });

  board.innerHTML = html;

  // スクロール処理
  if(targetId){
    setTimeout(() => {
      const el = document.getElementById('post-' + targetId);
      if(el) el.scrollIntoView({ behavior:'smooth', block:'start' });
    }, 500);
  }
};
</script>
