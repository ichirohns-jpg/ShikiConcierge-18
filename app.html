<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>志木お助け隊 回覧板</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef6ff;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}

.wrap{
  max-width:760px;
  margin:0 auto;
  padding:16px;
}

.header{
  background:#fff;
  border-radius:26px;
  overflow:hidden;
  box-shadow:0 10px 24px rgba(20,70,120,.12);
  margin-bottom:18px;
}

.banner{
  width:100%;
  display:block;
}

.header-body{
  padding:20px;
  text-align:center;
}

.main-title{
  margin:0;
  font-size:34px;
  line-height:1.4;
  font-weight:900;
  color:#0d5fa8;
}

.sub-title{
  margin-top:10px;
  font-size:18px;
  line-height:1.8;
  color:#5c6f80;
  font-weight:800;
}

.loading{
  padding:50px 20px;
  text-align:center;
  font-size:22px;
  font-weight:900;
  color:#678;
}

.card{
  background:#fff;
  border-radius:24px;
  overflow:hidden;
  margin-bottom:24px;
  box-shadow:0 8px 22px rgba(20,70,120,.10);
  border-top:5px solid #1687e0;
}

.media{
  width:100%;
  display:flex;
  overflow-x:auto;
  overflow-y:hidden;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  background:#e9eef4;
}

.slide{
  flex:0 0 100%;
  scroll-snap-align:start;
}

.slide.image{
  aspect-ratio:9/16;
}

.slide.video{
  aspect-ratio:16/9;
  background:#000;
}

.slide img,
.slide iframe{
  width:100%;
  height:100%;
  display:block;
  border:0;
}

.slide img{
  object-fit:cover;
}

.body{
  padding:20px;
}

.date{
  font-size:15px;
  font-weight:900;
  color:#789;
}

.title{
  margin-top:8px;
  font-size:30px;
  line-height:1.45;
  font-weight:900;
  color:#0d5fa8;
}

.detail{
  margin-top:16px;
  font-size:18px;
  line-height:1.9;
  color:#334;
  white-space:pre-wrap;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:60px;
  border-radius:18px;
  margin-top:18px;
  text-decoration:none;
  font-size:19px;
  font-weight:900;
  border:0;
}

.blue{
  background:linear-gradient(135deg,#1687e0,#0d5fa8);
  color:#fff;
}

.green{
  background:linear-gradient(135deg,#18b76a,#0d8b4c);
  color:#fff;
}

.share-box{
  margin-top:24px;
  padding-top:18px;
  border-top:1px solid #e5edf5;
}

.share-title{
  font-size:17px;
  font-weight:900;
  color:#5a6f80;
}

.share-buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:14px;
}

.share-btn{
  min-height:58px;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:#fff;
  font-size:18px;
  font-weight:900;
  border:0;
}

.share-line{
  background:#06c755;
}

.share-fb{
  background:#1877f2;
}

.share-x{
  background:#111;
}

.share-copy{
  background:#6c7a89;
}

</style>
</head>

<body>

<div class="wrap">

<div class="header">

<img class="banner"
src="https://drive.google.com/thumbnail?id=1HhzMcMDxsz5O_TVsux2Ycz2TvQMY4UTT&sz=w2000">

<div class="header-body">

<h1 class="main-title">
志木お助け隊 回覧板
</h1>

<div class="sub-title">
市からのお知らせや地域情報を
スマホで見やすくまとめて表示します
</div>

</div>

</div>

<div id="list">

<div class="loading">
読み込み中...
</div>

</div>

</div>

<script>

const SHEET_ID =
'1Xx0a0dRqSrL6pacX7xY5jyTtiQ1Ot8E03oLmMICfI6M';

const SHEET_NAME =
'回覧板データー';

const SITE_BASE =
'https://ichirohns-jpg.github.io/ShikiConcierge-18';

window.handleSheet = function(json){

  try{

    const rows =
      json.table.rows || [];

    let html = '';

    rows.reverse().forEach(function(r,index){

      const c = r.c || [];

      const date =
        getCell(c[0]);

      const title =
        getCell(c[1]);

      const image =
        getCell(c[2]);

      const detail =
        getCell(c[3]);

      const applyUrl =
        getCell(c[4]);

      const cityUrl =
        getCell(c[5]);

      const articleId =
        String(index + 1).padStart(3,'0');

      const shareUrl =
        SITE_BASE +
        '/share/' +
        articleId +
        '.html';

      const shareText =
        title || '志木お助け隊 回覧板';

      html += `

      <div class="card">

        <div class="media">

          <div class="slide image">

            <img src="${toImageUrl(image)}">

          </div>

        </div>

        <div class="body">

          <div class="date">
          ${esc(date)}
          </div>

          <div class="title">
          ${esc(title)}
          </div>

          <div class="detail">
          ${esc(detail)}
          </div>

          ${cityUrl ? `
          <a class="btn blue"
          href="${escAttr(cityUrl)}"
          target="_blank">
          詳しく見る
          </a>
          ` : ''}

          ${applyUrl ? `
          <a class="btn green"
          href="${escAttr(applyUrl)}"
          target="_blank">
          申込みはこちら
          </a>
          ` : ''}

          <div class="share-box">

            <div class="share-title">
            この記事をシェアする
            </div>

            <div class="share-buttons">

              <a class="share-btn share-line"
              target="_blank"
              rel="noopener"
              href="https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(shareUrl)}">
              LINE
              </a>

              <a class="share-btn share-fb"
              target="_blank"
              rel="noopener"
              href="https://www.facebook.com/dialog/share?app_id=1519320129765759&display=popup&href=${encodeURIComponent(shareUrl)}&redirect_uri=${encodeURIComponent(shareUrl)}">
              Facebook
              </a>

              <a class="share-btn share-x"
              target="_blank"
              rel="noopener"
              href="https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}">
              X
              </a>

              <button class="share-btn share-copy"
              onclick="copyShare('${shareUrl}')">
              URLコピー
              </button>

            </div>

          </div>

        </div>

      </div>

      `;

    });

    document.getElementById('list').innerHTML =
      html;

  }catch(e){

    document.getElementById('list').innerHTML =
      '<div class="loading">読み込み失敗</div>';

  }

};

function loadSheet(){

  const script =
    document.createElement('script');

  script.src =
    'https://docs.google.com/spreadsheets/d/' +
    SHEET_ID +
    '/gviz/tq?sheet=' +
    encodeURIComponent(SHEET_NAME) +
    '&tqx=out:json;responseHandler=handleSheet';

  document.body.appendChild(script);

}

loadSheet();

function copyShare(url){

  navigator.clipboard.writeText(url)
  .then(function(){

    alert('URLをコピーしました');

  });

}

function getCell(c){

  if(!c){

    return '';

  }

  if(c.v !== null &&
     c.v !== undefined){

    return String(c.v);

  }

  return '';

}

function toImageUrl(url){

  if(!url){

    return '';

  }

  const m =
    String(url).match(/[-\w]{25,}/);

  if(m){

    return 'https://drive.google.com/thumbnail?id=' +
      m[0] +
      '&sz=w2000';

  }

  return url;

}

function esc(s){

  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');

}

function escAttr(s){

  return esc(s);

}

</script>

</body>
</html>
