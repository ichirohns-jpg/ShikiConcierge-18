<head>

*{box-sizing:border-box}

body{
  margin:0;
  background:linear-gradient(180deg,#eef6ff 0%,#ffffff 100%);
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}

.wrap{
  max-width:760px;
  margin:0 auto;
  padding:18px 14px 50px;
}

.header{
  background:#fff;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 10px 28px rgba(20,70,120,.13);
  margin-bottom:18px;
}

.banner{
  width:100%;
  display:block;
}

.header-body{
  padding:22px 18px 26px;
  text-align:center;
}

.title{
  margin:0;
  font-size:34px;

  font-weight:900;
  color:#0d5fa8;
}

.desc{
  margin-top:12px;
  font-size:18px;
  line-height:1.7;
  font-weight:800;
  color:#5a6f80;
}

.tabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin:20px 0;
}

.tab{
  min-height:60px;
  border-radius:18px;
  font-size:19px;
  font-weight:900;
  border:0;
}

.active{
  background:linear-gradient(135deg,#1687e0,#0d5fa8);
  color:#fff;
}

.normal{
  background:#fff;
  color:#456;
  box-shadow:0 6px 16px rgba(20,70,120,.08);
}

.card{
  background:#fff;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 8px 22px rgba(20,70,120,.10);
  margin-bottom:20px;
  border-top:5px solid #1687e0;
}

.media{
  width:100%;

  background:#e9eef4;
}

.slide{
  flex:0 0 100%;
  aspect-ratio:9/16;
  scroll-snap-align:start;
  background:#f1f4f7;
}

.slide img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
}

.noimage{
  aspect-ratio:9/16;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#999;
  font-size:22px;
  background:#f1f1f1;
}

.body{
  padding:20px;
}

.date{
  font-size:15px;
  color:#789;
  font-weight:900;
}

.name{
  margin-top:8px;
  font-size:28px;
  line-height:1.35;
  font-weight:900;
  color:#0d5fa8;
}

.msg{
  margin-top:14px;
  font-size:18px;
  line-height:1.85;
  color:#334;
  white-space:pre-wrap;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:58px;
  border-radius:18px;
  text-decoration:none;
  font-size:18px;
  font-weight:900;
  margin-top:16px;
}

.blue{
  background:linear-gradient(135deg,#1687e0,#0d5fa8);
  color:#fff;
}

.green{
  background:linear-gradient(135deg,#18b76a,#0d8b4c);
  color:#fff;
}

.home{

  color:#fff;
  margin-top:30px;
}
