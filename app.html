<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>志木お助け隊 回覧板</title>

<meta property="og:title" content="志木お助け隊 回覧板">
<meta property="og:description" content="市からのお知らせや地域情報をスマホで見やすくまとめて表示します。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ichirohns-jpg.github.io/ShikiConcierge-18/">
<meta property="og:image" content="https://ichirohns-jpg.github.io/ShikiConcierge-18/IMG_4059.png">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://ichirohns-jpg.github.io/ShikiConcierge-18/IMG_4059.png">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef6ff;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}

.wrap{
  max-width:760px;
  margin:0 auto;
  padding:16px;
}

.header{
  background:#fff;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 10px 28px rgba(20,70,120,.13);
  margin-bottom:18px;
}

.banner{
  width:100%;
  display:block;
}

.header-body{
  padding:22px 18px 26px;
  text-align:center;
}

.title{
  margin:0;
  font-size:34px;
  line-height:1.3;
  font-weight:900;
  color:#0d5fa8;
}

.desc{
  margin-top:12px;
  font-size:18px;
  line-height:1.7;
  font-weight:800;
  color:#5a6f80;
}

.card{
  background:#fff;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 8px 22px rgba(20,70,120,.10);
  margin-bottom:22px;
  border-top:5px solid #1687e0;
}

.media img{
  width:100%;
  display:block;
}

.body{
  padding:20px;
}

.date{
  font-size:15px;
  color:#789;
  font-weight:900;
}

.name{
  margin-top:8px;
  font-size:28px;
  line-height:1.35;
  font-weight:900;
  color:#0d5fa8;
}

.msg{
  margin-top:14px;
  font-size:18px;
  line-height:1.85;
  color:#334;
  white-space:pre-wrap;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:58px;
  border-radius:18px;
  text-decoration:none;
  font-size:18px;
  font-weight:900;
  margin-top:16px;
  border:0;
}

.blue{
  background:linear-gradient(135deg,#1687e0,#0d5fa8);
  color:#fff;
}

.green{
  background:linear-gradient(135deg,#18b76a,#0d8b4c);
  color:#fff;
}

.share-box{
  margin-top:20px;
  border-top:1px solid #e5edf5;
  padding-top:18px;
}

.share-title{
  font-size:16px;
  font-weight:900;
  margin-bottom:12px;
  color:#5b6d7c;
}

.share-buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.share-btn{
  min-height:52px;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:#fff;
  font-size:16px;
  font-weight:900;
}

.share-line{
  background:#06c755;
}

.share-fb{
  background:#1877f2;
}

.share-x{
  background:#111;
}

.share-copy{
  background:#6c7a89;
  border:0;
}

.loading{
  text-align:center;
  padding:50px 20px;
  font-size:22px;
  font-weight:900;
  color:#789;
}

</style>
</head>

<body>

<div class="wrap">

<div class="header">

<img
class="banner"
src="https://drive.google.com/thumbnail?id=1HhzMcMDxsz5O_TVsux2Ycz2TvQMY4UTT&sz=w2000">

<div class="header-body">

<h1 class="title">
志木お助け隊 回覧板
</h1>

<div class="desc">
市からのお知らせや地域情報を<br>
スマホで見やすくまとめて表示します
</div>

</div>
</div>

<div id="list">
<div class="loading">読み込み中...</div>
</div>

</div>

<script>

const SHEET_ID='1Xx0a0dRqSrL6pacX7xY5jyTtiQ1Ot8E03oLmMICfI6M';
const SHEET_NAME='回覧板データー';

window.handleSheet=function(json){

  try{

    const rows=json.table.rows||[];

    let html='';

    rows.reverse().forEach((r,index)=>{

      const c=r.c||[];

      const title=getCell(c[1]);
      const image=getCell(c[2]);
      const detail=getCell(c[3]);
      const applyUrl=getCell(c[4]);
      const cityUrl=getCell(c[5]);

      if(!title && !detail)return;

      html+=`
      <div class="card">

        <div class="media">
          ${image ? `<img src="${image}">` : ''}
        </div>

        <div class="body">

          <div class="date">
            ${getCell(c[0])}
          </div>

          <div class="name">
            ${title}
          </div>

          <div class="msg">
            ${detail||''}
          </div>

          ${cityUrl ? `
          <a
            class="btn blue"
            href="${cityUrl}"
            target="_blank">
            詳しく見る
          </a>
          ` : ''}

          ${applyUrl ? `
          <a
            class="btn green"
            href="${applyUrl}"
            target="_blank">
            申込みはこちら
          </a>
          ` : ''}

          <div class="share-box">

            <div class="share-title">
              この記事をシェアする
            </div>

            <div class="share-buttons">

              <a
                class="share-btn share-line"
                target="_blank"
                href="https://social-plugins.line.me/lineit/share?url=https://ichirohns-jpg.github.io/ShikiConcierge-18/share-001.html">
                LINE
              </a>

              <a
                class="share-btn share-fb"
                target="_blank"
                href="https://www.facebook.com/sharer/sharer.php?u=https://ichirohns-jpg.github.io/ShikiConcierge-18/share-001.html">
                Facebook
              </a>

              <a
                class="share-btn share-x"
                target="_blank"
                href="https://twitter.com/intent/tweet?url=https://ichirohns-jpg.github.io/ShikiConcierge-18/share-001.html&text=志木お助け隊 回覧板">
                X
              </a>

              <button
                class="share-btn share-copy"
                onclick="copyUrl()">
                URLコピー
              </button>

            </div>

          </div>

        </div>

      </div>
      `;

    });

    document.getElementById('list').innerHTML=html;

  }catch(e){

    document.getElementById('list').innerHTML=
      '<div class="loading">読み込み失敗</div>';

  }

};

function copyUrl(){

  navigator.clipboard.writeText(
    'https://ichirohns-jpg.github.io/ShikiConcierge-18/share-001.html'
  );

  alert('URLをコピーしました');

}

function getCell(c){

  if(!c)return'';

  if(c.f!==null && c.f!==undefined){
    return String(c.f);
  }

  if(c.v!==null && c.v!==undefined){
    return String(c.v);
  }

  return'';

}

const script=document.createElement('script');

script.src=
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=' +
encodeURIComponent(SHEET_NAME) +
'&tqx=out:json;responseHandler:handleSheet';

document.body.appendChild(script);

</script>

</body>
</html>
