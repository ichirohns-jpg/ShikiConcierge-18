<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>志木お助け隊 回覧板</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef3f8;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}

.wrap{
  max-width:680px;
  margin:0 auto;
  padding:12px;
}

.banner{
  border-radius:22px;
  overflow:hidden;
  margin-bottom:14px;
}

.banner img{
  width:100%;
  display:block;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.date{
  font-size:15px;
  font-weight:700;
  color:#60758a;
  margin-bottom:10px;
}

.title{
  font-size:28px;
  line-height:1.45;
  font-weight:900;
  margin-bottom:14px;
}

.image{
  width:100%;
  border-radius:18px;
  margin-bottom:16px;
}

.detail{
  font-size:20px;
  line-height:1.9;
  white-space:pre-wrap;
  margin-bottom:16px;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:58px;
  border-radius:16px;
  text-decoration:none;
  font-size:19px;
  font-weight:900;
  color:#fff;
  margin-bottom:12px;
}

.home-btn{
  background:#0b5ed7;
}

.apply-btn{
  background:#16a34a;
}

.share-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:18px;
}

.share-btn{
  border:0;
  border-radius:16px;
  min-height:54px;
  font-size:17px;
  font-weight:900;
  color:#fff;
}

.fb{background:#1877f2}
.x{background:#000}
.line{background:#06c755}
.copy{background:#5f7389}

.loading{
  text-align:center;
  padding:40px;
  font-size:22px;
  font-weight:900;
}
</style>
</head>

<body>

<div class="wrap">

<div class="banner">
<img src="https://drive.google.com/thumbnail?id=1HhzMcMDxsz5O_TVsux2Ycz2TvQMY4UTT&sz=w2000">
</div>

<div id="board">
<div class="loading">読み込み中...</div>
</div>

</div>

<script>

var SHEET_ID='1Xx0a0dRqSrL6pacX7xY5jyTtiQ1Ot8E03oLmMICfI6M';
var SHEET_NAME='回覧板データー';

function v(c,i){
  if(!c[i]) return '';
  if(c[i].v===null||c[i].v===undefined) return '';
  return String(c[i].v);
}

function driveImage(url){

  var m=String(url||'').match(/\/d\/([a-zA-Z0-9_-]+)/);

  if(m&&m[1]){
    return 'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w2000';
  }

  return url;
}

window.handleSheet=function(json){

  var rows=json.table.rows||[];

  var html='';

  rows.forEach(function(r,index){

    var c=r.c||[];

    var date=v(c,0);
    var title=v(c,1);
    var image=v(c,2);
    var detail=v(c,3);
    var apply=v(c,4);
    var page=v(c,5);
    var sort=Number(v(c,10)||0);
    var id=v(c,11)||String(index+1);

    if(!title) return;

    var shareUrl=
    'https://ichirohns-jpg.github.io/ShikiConcierge-18/app.html?id='+id;

    html+='
    <div class="card" id="post-'+id+'">

      <div class="date">'+date+'</div>

      <div class="title">'+title+'</div>

      '+(image?'<img class="image" src="'+driveImage(image)+'">':'')+'

      <div class="detail">'+detail+'</div>

      '+(page?'<a class="btn home-btn" href="'+page+'" target="_blank">詳しく見る</a>':'')+'

      '+(apply?'<a class="btn apply-btn" href="'+apply+'" target="_blank">申込みはこちら</a>':'')+'

      <div class="share-grid">

        <button class="share-btn fb"
        onclick="window.open(\'https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(shareUrl)+'\',\'_blank\')">
        Facebook
        </button>

        <button class="share-btn x"
        onclick="window.open(\'https://twitter.com/intent/tweet?url='+encodeURIComponent(shareUrl)+'\',\'_blank\')">
        X
        </button>

        <button class="share-btn line"
        onclick="window.open(\'https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(shareUrl)+'\',\'_blank\')">
        LINE
        </button>

        <button class="share-btn copy"
        onclick="navigator.clipboard.writeText(\''+shareUrl+'\')">
        URLコピー
        </button>

      </div>

    </div>';

  });

  document.getElementById('board').innerHTML=html;

};

var s=document.createElement('script');

s.src=
'https://docs.google.com/spreadsheets/d/'+
SHEET_ID+
'/gviz/tq?sheet='+
encodeURIComponent(SHEET_NAME)+
'&tqx=out:json;responseHandler=handleSheet';

document.body.appendChild(s);

</script>

</body>
</html>
