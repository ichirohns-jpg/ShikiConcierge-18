<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>志木お助け隊</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #eef5fb;
      overflow: hidden;
    }

    body {
      -webkit-text-size-adjust: 100%;
    }

    #app {
      width: 100%;
      height: 100vh;
      height: 100svh;
      border: 0;
      display: block;
      background: #eef5fb;
    }
  </style>
</head>

<body>
  <iframe id="app" title="志木お助け隊"></iframe>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyvDqS0BRQSC3bIqlhcYx7fsWqu80YLPnwyUXv2O0AETlpJr3hQNGMxdQgvaxwJDpie0Q/exec";

    function loadGasPage() {
      const gas = new URL(GAS_URL);
      const current = new URL(window.location.href);

      current.searchParams.forEach(function(value, key) {
        if (key !== "_") {
          gas.searchParams.set(key, value);
        }
      });

      gas.searchParams.set("_", Date.now().toString());

      document.getElementById("app").src = gas.toString();
    }

    loadGasPage();
  </script>
</body>
</html>
