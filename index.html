<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>志木お助け隊</title>
  <style>
    :root{
      --bg:#f3f5f9;
      --text:#1f2d3d;
      --line:#dfe7f1;
      --blue:#1a73e8;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:var(--bg);
      font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,"Hiragino Sans",Meiryo,sans-serif;
      overflow:hidden;
    }
    .app{
      position:fixed;
      inset:0;
      background:var(--bg);
    }
    .frame{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#fff;
    }
    .loading{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:14px;
      background:var(--bg);
      color:var(--text);
      z-index:2;
      transition:opacity .25s ease;
    }
    .loading.hide{
      opacity:0;
      pointer-events:none;
    }
    .spinner{
      width:42px;
      height:42px;
      border:4px solid #d9e4f5;
      border-top-color:var(--blue);
      border-radius:50%;
      animation:spin 1s linear infinite;
    }
    .loading-text{
      font-size:18px;
      font-weight:700;
      line-height:1.6;
    }
    .fallback{
      margin-top:6px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:52px;
      padding:12px 18px;
      border-radius:999px;
      background:#fff;
      color:var(--blue);
      border:2px solid var(--blue);
      text-decoration:none;
      font-size:17px;
      font-weight:800;
    }
    @keyframes spin{
      to{transform:rotate(360deg)}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">志木お助け隊を読み込み中です…</div>
      <a
        class="fallback"
        href="https://script.google.com/macros/s/AKfycbzfwafLwO8afofneEkv_00q9zu2vYMN6dSJIRK88Y7x9iQIm1MSz54cuz3MTkjnsty9Ig/exec"
        target="_blank"
        rel="noopener noreferrer"
      >直接開く</a>
    </div>

    <iframe
      id="appFrame"
      class="frame"
      src="https://script.google.com/macros/s/AKfycbzfwafLwO8afofneEkv_00q9zu2vYMN6dSJIRK88Y7x9iQIm1MSz54cuz3MTkjnsty9Ig/exec"
      loading="eager"
      allowfullscreen
      referrerpolicy="no-referrer">
    </iframe>
  </div>

  <script>
    const frame = document.getElementById('appFrame');
    const loading = document.getElementById('loading');

    function hideLoading() {
      loading.classList.add('hide');
    }

    frame.addEventListener('load', hideLoading);
    setTimeout(hideLoading, 3000);
  </script>
</body>
</html>
