<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>志木お助け隊</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #f3f5f9;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, "Hiragino Sans", Meiryo, sans-serif;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      background: #f3f5f9;
    }

    .frame-wrap {
      width: 100%;
      min-height: 100vh;
      background: #f3f5f9;
    }

    iframe {
      display: block;
      width: 100%;
      min-height: 100vh;
      border: 0;
      background: #f3f5f9;
    }

    .fallback {
      display: none;
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .card {
      background: #ffffff;
      border-radius: 22px;
      box-shadow: 0 6px 20px rgba(0,0,0,.10);
      padding: 22px 18px;
    }

    .title {
      font-size: 28px;
      line-height: 1.5;
      font-weight: 800;
      color: #1a73e8;
      margin: 0 0 12px;
    }

    .text {
      font-size: 18px;
      line-height: 1.9;
      color: #334155;
      margin: 0 0 18px;
      word-break: break-word;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60px;
      padding: 14px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 20px;
      font-weight: 800;
      background: #1a73e8;
      color: #ffffff;
    }

    @media (max-width: 430px) {
      .title {
        font-size: 25px;
      }

      .text {
        font-size: 17px;
      }

      .btn {
        font-size: 19px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="frame-wrap">
      <iframe
        id="appFrame"
        src="https://script.google.com/macros/s/AKfycbwJ1Fcq9rqOABDyWD9j9uCK5rV7274ogezzaMwIW-W2YzSYIH2tGIp77JXvO2E2m-yp/exec"
        title="志木お助け隊"
        loading="eager"
        referrerpolicy="no-referrer"
        allowfullscreen>
      </iframe>
    </div>

    <div id="fallback" class="fallback">
      <div class="card">
        <h1 class="title">志木お助け隊</h1>
        <p class="text">
          読み込みがうまくいかない場合は、下のボタンから直接開いてください。
        </p>
        <a
          class="btn"
          href="https://script.google.com/macros/s/AKfycbwJ1Fcq9rqOABDyWD9j9uCK5rV7274ogezzaMwIW-W2YzSYIH2tGIp77JXvO2E2m-yp/exec"
          target="_blank"
          rel="noopener noreferrer">
          直接開く
        </a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var iframe = document.getElementById('appFrame');
      var fallback = document.getElementById('fallback');

      var shown = false;

      function showFallback() {
        if (shown) return;
        shown = true;
        fallback.style.display = 'block';
      }

      iframe.addEventListener('error', function () {
        showFallback();
      });

      setTimeout(function () {
        showFallback();
      }, 8000);
    })();
  </script>
</body>
</html>
