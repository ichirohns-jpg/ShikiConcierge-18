<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>志木お助け隊</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="志木お助け隊">
  <meta name="theme-color" content="#f3f5f9">

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./IMG_4059.png">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #f3f5f9;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, "Hiragino Sans", Meiryo, sans-serif;
    }

    body {
      -webkit-text-size-adjust: 100%;
    }

    .app {
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #f3f5f9;
    }

    iframe {
      display: block;
      width: 100vw;
      height: 100vh;
      border: 0;
      margin: 0;
      padding: 0;
      background: #f3f5f9;
    }
  </style>
</head>
<body>
  <div class="app">
    <iframe
      id="appFrame"
      title="志木お助け隊"
      loading="eager"
      referrerpolicy="no-referrer"
      allowfullscreen>
    </iframe>
  </div>

  <script>
    (function () {
      const GS_URL = 'https://script.google.com/macros/s/AKfycbwqGFVPDK8P9mV3YRLXOV2VbBlOczKcvVrxpXnEiwpA4UMrvlDlbgB0j6okCBxHLEtfPA/exec';
      document.getElementById('appFrame').src = GS_URL + '?t=' + Date.now();
    })();
  </script>
</body>
</html>
