<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>志木お助け隊DX</title>
<style>
/* 元のコードのデザインを完全維持 */
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  background:#eef5fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}
.page{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:14px;
}
.banner{
  width:100%;
  border-radius:18px;
  overflow:hidden;
  background:#dfeaf6;
  box-shadow:0 6px 18px rgba(20,70,120,.14);
  margin-bottom:18px;
}
.banner img{
  width:100%;
  display:block;
}
.card{
  background:#fff;
  border-radius:24px;
  padding:24px 18px;
  box-shadow:0 6px 18px rgba(20,70,120,.12);
  text-align:center;
}
.title{
  font-size:30px;
  font-weight:900;
  color:#134477;
  margin:0 0 10px;
}
.sub{
  font-size:20px;
  font-weight:700;
  color:#49657f;
  margin:0 0 22px;
}
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:72px;
  border-radius:20px;
  color:#fff;
  font-size:25px;
  font-weight:900;
  text-decoration:none;
  margin:16px 0;
  box-shadow:0 7px 16px rgba(0,0,0,.18);
  border:none;
  cursor:pointer;
}
.blue{background:linear-gradient(135deg,#2f80ed,#1c73c9)}
.green{background:linear-gradient(135deg,#27ae60,#1aa56c)}
.dark{background:linear-gradient(135deg,#666,#444)}
.note{
  margin-top:20px;
  font-size:17px;
  line-height:1.7;
  color:#607488;
}
textarea{
  width:100%;
  height:130px;
  border:2px solid #d7dce3;
  border-radius:18px;
  padding:16px;
  font-size:18px;
  line-height:1.6;
}

/* 表示制御 */
.view { display: none; }
.view.active { display: block; }
</style>
</head>
<body>

<div class="page">

  <!-- TOP画面 -->
  <div id="home" class="view active">
    <div class="banner">
      <img src="https://drive.google.com/thumbnail?id=1e6vAa1Y0oOvOlAwpgHaSvqm5mZHEEWaH&sz=w2000" alt="志木お助け隊DX">
    </div>
    <div class="card">
      <h1 class="title">志木お助け隊DX</h1>
      <p class="sub">見たいページを選んでください</p>
      <button class="btn blue" onclick="nav('board')">回覧板を見る</button>
      <button class="btn green" onclick="nav('concierge')">AIコンシェルジュを使う</button>
      <div class="note">
        市からのお知らせと、暮らしの相談先を<br>
        わかりやすく案内します。
      </div>
    </div>
  </div>

  <!-- 回覧板画面 -->
  <div id="board" class="view">
    <div class="banner">
      <img src="https://drive.google.com/thumbnail?id=1HhzMcMDxsz5O_TVsux2Ycz2TvQMY4UTT&sz=w2000" alt="回覧板">
    </div>
    <button class="btn dark" onclick="nav('home')">トップに戻る</button>
    <div class="card" style="margin-top:10px;">
      <h1 class="title">回覧板</h1>
      <p class="sub">最新のお知らせ</p>
      <div id="board-content" style="text-align:left; font-size:18px; color:#607488;">
        データを読み込んでいます...
      </div>
    </div>
  </div>

  <!-- コンシェルジュ画面 -->
  <div id="concierge" class="view">
    <div class="banner">
      <img src="https://drive.google.com/thumbnail?id=1q6NBKaTPNs0tskub_deePwNPb2u0xCYv&sz=w3000" alt="コンシェルジュ">
    </div>
    <button class="btn dark" onclick="nav('home')">トップに戻る</button>
    <div class="card" style="margin-top:10px;">
      <h1 class="title" style="color:#1a73e8">AIコンシェルジュ</h1>
      <p class="sub" style="text-align:left; font-size:18px;">ご相談内容を入力してください</p>
      <textarea id="msg" placeholder="例：洪水ハザードマップが見たい"></textarea>
      <button class="btn blue" onclick="alert('相談機能を実行します')">相談する</button>
      <div id="result" class="note" style="text-align:left; border-top:1px solid #eee; padding-top:10px; margin-top:20px;">
        結果はここに表示されます
      </div>
    </div>
  </div>

</div>

<script>
/**
 * 画面遷移関数：確実にIDで切り替えます
 */
function nav(id) {
  // 全画面を非表示
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  // 対象を表示
  const target = document.getElementById(id);
  if(target) {
    target.classList.add('active');
    window.scrollTo(0,0);
  }
}

// ページ読み込み時の初期化
window.onload = function() {
  document.getElementById('board-content').innerHTML = `
    <div style="background:#f7fbff; border:1px solid #d8e6f5; border-radius:18px; padding:16px;">
      <div style="font-weight:bold; color:#173f6d; font-size:22px; margin-bottom:8px;">【重要】システム移行のお知らせ</div>
      <p style="margin:0; line-height:1.6;">GitHub Pages版の回覧板が正常に表示されました。</p>
    </div>
  `;
};
</script>
</body>
</html>
