<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>志木お助け隊</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #eef5fb;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100vh;
      height: 100svh;
      border: 0;
      display: block;
      background: #eef5fb;
    }
  </style>
</head>

<body>
  <iframe id="app" title="志木お助け隊"></iframe>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz6HuEGX12frx4nJ9W1umLc_Wk41flvUDsDY1sy1rc6amBjRBu24A69zluClBkcQ08g/exec";

    const url = new URL(GAS_URL);
    url.searchParams.set("_", Date.now().toString());

    document.getElementById("app").src = url.toString();
  </script>
</body>
</html>
