<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>志木お助け隊DX</title>
<style>
/* デザインは1ミリも変えずに維持 */
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  background:#eef5fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}
.page{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:14px;
}
.banner{
  width:100%;
  border-radius:18px;
  overflow:hidden;
  background:#dfeaf6;
  box-shadow:0 6px 18px rgba(20,70,120,.14);
  margin-bottom:18px;
}
.banner img{
  width:100%;
  display:block;
}
.card{
  background:#fff;
  border-radius:24px;
  padding:24px 18px;
  box-shadow:0 6px 18px rgba(20,70,120,.12);
  text-align:center;
}
.title{
  font-size:30px;
  font-weight:900;
  color:#134477;
  margin:0 0 10px;
}
.sub{
  font-size:20px;
  font-weight:700;
  color:#49657f;
  margin:0 0 22px;
}
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:72px;
  border-radius:20px;
  color:#fff;
  font-size:25px;
  font-weight:900;
  text-decoration:none;
  margin:16px 0;
  box-shadow:0 7px 16px rgba(0,0,0,.18);
  border:none;
  cursor:pointer;
}
.blue{background:linear-gradient(135deg,#2f80ed,#1c73c9)}
.green{background:linear-gradient(135deg,#27ae60,#1aa56c)}
.dark{background:linear-gradient(135deg,#666,#444)}

/* 回覧板カード用スタイル */
.card-item {
  background:#fff;
  border:1px solid #d8e6f5;
  border-radius:18px;
  padding:16px;
  margin-bottom:20px;
  text-align:left;
  box-shadow:0 3px 12px rgba(21,66,112,.08);
}
.card-date { font-size:18px; font-weight:800; color:#44627f; margin-bottom:6px; }
.card-info-title { font-size:26px; font-weight:900; color:#173f6d; margin-bottom:12px; }
.card-detail { font-size:21px; line-height:1.75; color:#22384d; white-space:pre-wrap; }

/* ページ切り替え */
.view { display: none; }
.active { display: block; }
</style>
</head>
<body>

<div class="page">

  <!-- ========================= トップ画面 ========================= -->
  <div id="view-home" class="view active">
    <div class="banner">
      <img src="https://drive.google.com/thumbnail?id=1e6vAa1Y0oOvOlAwpgHaSvqm5mZHEEWaH&sz=w2000" alt="志木お助け隊DX">
    </div>
    <div class="card">
      <h1 class="title">志木お助け隊DX</h1>
      <p class="sub">見たいページを選んでください</p>
      <button class="btn blue" onclick="nav('board')">回覧板を見る</button>
      <button class="btn green" onclick="nav('concierge')">AIコンシェルジュを使う</button>
    </div>
  </div>

  <!-- ========================= 回覧板画面 ========================= -->
  <div id="view-board" class="view">
    <div class="banner">
      <img src="https://drive.google.com/thumbnail?id=1HhzMcMDxsz5O_TVsux2Ycz2TvQMY4UTT&sz=w2000" alt="回覧板">
    </div>
    <button class="btn dark" onclick="nav('home')">トップに戻る</button>
    
    <div class="card" style="margin-top:14px; padding:14px;">
      <h1 class="title">回覧板</h1>
      <p class="sub" style="margin-bottom:14px;">最新のお知らせ</p>
      
      <div id="board-list">
        <!-- ここにJavaScriptで内容が入ります -->
      </div>
    </div>
  </div>

  <!-- ========================= コンシェルジュ画面 ========================= -->
  <div id="view-concierge" class="view">
    <div class="banner">
      <img src="https://drive.google.com/thumbnail?id=1q6NBKaTPNs0tskub_deePwNPb2u0xCYv&sz=w3000" alt="コンシェルジュ">
    </div>
    <button class="btn dark" onclick="nav('home')">トップに戻る</button>
    
    <div class="card" style="margin-top:14px;">
      <h1 class="title" style="color:#1a73e8">AIコンシェルジュ</h1>
      <div style="text-align:left; font-size:18px; font-weight:900; color:#1a73e8; margin-bottom:8px;">ご相談内容を入力</div>
      <textarea id="msg" style="width:100%; height:120px; border:2px solid #d7dce3; border-radius:18px; padding:12px; font-size:18px;"></textarea>
      <button class="btn blue" onclick="alert('相談機能を準備中です')">相談する</button>
    </div>
  </div>

</div>

<script>
/**
 * 画面を切り替える関数
 */
function nav(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  window.scrollTo(0,0);
}

/**
 * ダミーの回覧板データ（ここを書き換えれば内容が変わります）
 */
const dummyData = [
  {
    date: "2026年5月5日",
    title: "GitHub Pages版が正常に起動しました",
    detail: "回覧板の表示テストです。スプレッドシートとの連携がなくても、このコードを編集することで内容を更新できます。"
  },
  {
    date: "2026年5月1日",
    title: "志木お助け隊DX 運用開始",
    detail: "地域のデジタル化を進めるための新しいツールをご活用ください。"
  }
];

/**
 * ページ読み込み時に回覧板を表示する
 */
window.onload = function() {
  const container = document.getElementById('board-list');
  container.innerHTML = dummyData.map(item => `
    <div class="card-item">
      <div class="card-date">${item.date}</div>
      <div class="card-info-title">${item.title}</div>
      <div class="card-detail">${item.detail}</div>
    </div>
  `).join('');
};
</script>

</body>
</html>
