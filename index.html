<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>志木市デジタル回覧板・志木市役所AIコンシェルジュ</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --sub:#5f6b7a;
      --line:#d7dde7;
      --shadow:0 8px 22px rgba(0,0,0,.08);
      --blue:#16528a;
      --blue2:#2276c8;
      --green:#149654;
      --greenBg:#ebfff3;
      --linkBg:#eef6ff;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;padding:0;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
    }
    body{max-width:760px;margin:0 auto;padding:0 12px 32px}
    .hero-img{
      width:100%;display:block;margin:12px 0 14px;border-radius:18px;box-shadow:var(--shadow)
    }
    .card{
      background:var(--card);border:1px solid #ecf1f7;border-radius:18px;
      box-shadow:var(--shadow);padding:16px;margin-bottom:14px;
    }
    h1,h2,h3{margin:0 0 10px}
    h1{font-size:30px;line-height:1.28}
    h2{font-size:24px;line-height:1.35}
    p,.sub{font-size:17px;line-height:1.8;color:var(--sub);margin:0}
    .status{font-size:18px;line-height:1.7;font-weight:700;color:#35526b}
    .kairan-item{
      background:#fff;border:1px solid #edf2f7;border-radius:18px;overflow:hidden;
      box-shadow:var(--shadow);margin-bottom:16px;
    }
    .main-image{width:100%;display:block;background:#eef2f7}
    .body{padding:14px}
    .date{font-size:16px;line-height:1.5;color:#5b6f87;font-weight:800;margin-bottom:6px}
    .item-title{font-size:24px;line-height:1.45;font-weight:800;margin:0 0 10px}
    .detail{font-size:20px;line-height:1.8;white-space:pre-wrap}
    .thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
    .thumb{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:10px;background:#eef2f7}
    .links{display:grid;gap:10px;margin-top:14px}
    .link-btn{
      display:block;text-decoration:none;text-align:center;min-height:60px;line-height:60px;
      border-radius:14px;font-size:22px;font-weight:800;background:var(--linkBg);
      color:#114c81;border:2px solid #cde0f5;
    }
    .tel-btn{background:var(--greenBg);color:#117344;border-color:#bee7cd}
    .textarea{
      width:100%;min-height:180px;resize:vertical;border:2px solid var(--line);border-radius:16px;
      padding:16px;font-size:22px;line-height:1.8;outline:none;background:#fff;margin-top:12px;
    }
    .textarea:focus{border-color:#6ea6ec;box-shadow:0 0 0 4px rgba(110,166,236,.18)}
    .btn{
      width:100%;min-height:68px;border:none;border-radius:16px;font-size:24px;font-weight:800;
      margin-top:12px;box-shadow:var(--shadow);cursor:pointer
    }
    .btn-primary{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff}
    .btn-sub{background:#edf2f7;color:#28435a}
    .result-block{
      margin-top:12px;padding:14px;border-radius:16px;background:#f5f9ff;border:1px solid #d9e7f6
    }
    .label{font-size:16px;line-height:1.5;font-weight:800;color:#35526d;margin-bottom:6px}
    .value{font-size:22px;line-height:1.8;word-break:break-word;white-space:pre-wrap}
    .candidates{display:grid;gap:10px;margin-top:10px}
    .candidate{background:#fafbfd;border:1px solid #e2e8f0;border-radius:14px;padding:12px}
    .candidate-title{font-size:20px;line-height:1.5;font-weight:800;margin:0 0 6px}
    .score{display:inline-block;margin-top:8px;padding:6px 10px;border-radius:999px;font-size:15px;font-weight:800;background:#e8f0fb;color:#295684}
    .footer{text-align:center;padding:8px 4px 20px;color:#66778b;font-size:14px;line-height:1.8}
    .admin-link{color:#66778b;text-decoration:none;border-bottom:1px solid #9eb0c6}
  </style>
</head>
<body>
  <img class="hero-img" src="./IMG_4059.png" alt="志木市デジタル回覧板">

  <div class="card">
    <h2>回覧板</h2>
    <p class="sub">画像がある記事だけを最新順で表示します。画像のあとに、見やすい詳細とリンクを出します。</p>
  </div>

  <div id="kairanStatus" class="card">
    <div class="status">読み込み中です...</div>
  </div>

  <div id="kairanList"></div>

  <img class="hero-img" src="./IMG_4060.png" alt="志木市役所AIコンシェルジュ">

  <div class="card">
    <h1>志木市役所AIコンシェルジュ</h1>
    <p class="sub">困っていることを書くと、何の案内か、どこの担当か、まず何をすればよいかを分かりやすく案内します。</p>
  </div>

  <div class="card">
    <h2>調べたいことを書く</h2>
    <p class="sub">困っていることをそのまま書いてください</p>
    <textarea id="consultText" class="textarea" placeholder="例：住民票が欲しいです / 水道料金の支払い方法を知りたい / 粗大ごみの出し方を知りたい"></textarea>
    <p class="sub" style="margin-top:10px;">AIが整理して、この画面の中でまず分かるように案内します。まだ不安な時だけ電話し、もっと詳しいことは公式ページを見ます。</p>
    <button class="btn btn-primary" onclick="searchConcierge()">相談する</button>
    <button class="btn btn-sub" onclick="clearConsult()">消す</button>
    <div id="consultStatus" class="status" style="margin-top:12px;"></div>
  </div>

  <div id="resultCard" class="card" style="display:none;">
    <h2>案内結果</h2>

    <div class="result-block">
      <div class="label">相談の要約</div>
      <div id="rTheme" class="value"></div>
    </div>

    <div class="result-block">
      <div class="label">担当</div>
      <div id="rDept" class="value"></div>
    </div>

    <div class="result-block">
      <div class="label">最初の一歩</div>
      <div id="rGuide" class="value"></div>
    </div>

    <div class="result-block">
      <div class="label">くわしい案内</div>
      <div id="rEasy" class="value"></div>
    </div>

    <div class="result-block">
      <div class="label">どういうときに確認するか</div>
      <div id="rWhen" class="value"></div>
    </div>

    <div class="result-block">
      <div class="label">急ぎ度</div>
      <div id="rConfidence" class="value"></div>
    </div>

    <a id="rTel" class="link-btn tel-btn" href="#" style="display:none;">電話する</a>
    <a id="rUrl" class="link-btn" href="#" target="_blank" rel="noopener" style="display:none;">公式ページを見る</a>

    <div class="result-block">
      <div class="label">近い候補</div>
      <div id="candidateList" class="candidates"></div>
    </div>
  </div>

  <div class="footer">
    <a class="admin-link" href="https://github.com/ichirohns-jpg/ShikiConcierge-18/edit/main/index.html" target="_blank" rel="noopener">管理者用</a>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxOLOYf5tBWost_ILUlT43KiNu-NJZF5JrB9QxPqxHf-1R9A5EUmHdPJiSOyKeJWduW/exec';

    document.addEventListener('DOMContentLoaded', () => {
      loadKairan();
    });

    async function postJson(payload) {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return await res.json();
    }

    async function loadKairan() {
      const status = document.getElementById('kairanStatus');
      const list = document.getElementById('kairanList');

      status.innerHTML = '<div class="status">読み込み中です...</div>';
      list.innerHTML = '';

      try {
        const data = await postJson({ action: 'getKairan' });

        if (!data.ok) {
          status.innerHTML = '<div class="status">回覧板を読み込めませんでした。</div>';
          return;
        }

        const items = Array.isArray(data.items) ? data.items : [];
        status.style.display = 'none';

        if (!items.length) {
          list.innerHTML = '<div class="card"><div class="status">表示できる回覧板がありません。</div></div>';
          return;
        }

        list.innerHTML = items.map(item => renderKairanItem(item)).join('');
      } catch (err) {
        status.innerHTML = '<div class="status">回覧板を読み込めませんでした。</div>';
      }
    }

    function renderKairanItem(item) {
      const images = Array.isArray(item.images) ? item.images.filter(Boolean) : [];
      const mainImage = images[0] ? `<img class="main-image" src="${escapeHtml(images[0])}" alt="">` : '';
      const thumbs = images.slice(1).map(url => `<img class="thumb" src="${escapeHtml(url)}" alt="">`).join('');
      const thumbWrap = thumbs ? `<div class="thumbs">${thumbs}</div>` : '';
      const applyBtn = item.applyUrl ? `<a class="link-btn" href="${escapeHtml(item.applyUrl)}" target="_blank" rel="noopener">申込みを見る</a>` : '';
      const pageBtn = item.pageUrl ? `<a class="link-btn" href="${escapeHtml(item.pageUrl)}" target="_blank" rel="noopener">詳しく見る</a>` : '';

      return `
        <article class="kairan-item">
          ${mainImage}
          <div class="body">
            <div class="date">${escapeHtml(item.date || '')}</div>
            <h3 class="item-title">${escapeHtml(item.title || '')}</h3>
            <div class="detail">${escapeHtml(item.detail || '')}</div>
            ${thumbWrap}
            <div class="links">
              ${applyBtn}
              ${pageBtn}
            </div>
          </div>
        </article>
      `;
    }

    async function searchConcierge() {
      const text = document.getElementById('consultText').value.trim();
      const status = document.getElementById('consultStatus');
      const resultCard = document.getElementById('resultCard');

      if (!text) {
        status.textContent = '相談内容を書いてください。';
        return;
      }

      status.textContent = '相談先を確認しています…';
      resultCard.style.display = 'none';

      try {
        const data = await postJson({
          action: 'conciergeSearch',
          text: text
        });

        if (!data.ok || !data.best) {
          status.textContent = '近い案内を見つけられませんでした。言い方を少し変えてもう一度お試しください。';
          return;
        }

        status.textContent = '';
        const best = data.best;

        document.getElementById('rTheme').textContent = best.citizenTheme || best.theme || '';
        document.getElementById('rDept').textContent = best.department || '';
        document.getElementById('rGuide').textContent = best.guide1 || best.guide2 || '';
        document.getElementById('rEasy').textContent = best.easyText || best.description || '';
        document.getElementById('rWhen').textContent = best.whenToCheck || '';
        document.getElementById('rConfidence').textContent = convertConfidence(data.confidence);

        const telBtn = document.getElementById('rTel');
        const rawPhone = (best.phone || '').trim();
        if (rawPhone) {
          const telOnly = rawPhone.replace(/[^\d]/g, '');
          telBtn.style.display = 'block';
          telBtn.href = 'tel:' + telOnly;
          telBtn.textContent = '電話する：' + rawPhone;
        } else {
          telBtn.style.display = 'none';
          telBtn.removeAttribute('href');
        }

        const urlBtn = document.getElementById('rUrl');
        if (best.url) {
          urlBtn.style.display = 'block';
          urlBtn.href = best.url;
        } else {
          urlBtn.style.display = 'none';
          urlBtn.removeAttribute('href');
        }

        const candidates = Array.isArray(data.candidates) ? data.candidates : [];
        document.getElementById('candidateList').innerHTML = candidates.map(c => `
          <div class="candidate">
            <div class="candidate-title">${escapeHtml(c.citizenTheme || c.theme || '')}</div>
            <div>${escapeHtml(c.department || '')}</div>
            <div class="score">一致点 ${escapeHtml(String(c.score || ''))}</div>
          </div>
        `).join('');

        resultCard.style.display = 'block';
        resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch (err) {
        status.textContent = '検索中にエラーが出ました。';
      }
    }

    function clearConsult() {
      document.getElementById('consultText').value = '';
      document.getElementById('consultStatus').textContent = '';
      document.getElementById('resultCard').style.display = 'none';
    }

    function convertConfidence(confidence) {
      if (confidence === 'high') return '高め';
      if (confidence === 'medium') return '中くらい';
      return '低め';
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
