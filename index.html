<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>志木お助け隊</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2757a5">
  <link rel="apple-touch-icon" href="IMG_4059.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="志木お助け隊">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #eef3f8;
      color: #1b2d3f;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .wrap {
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
      min-height: 100vh;
      background: #eef3f8;
      padding-bottom: 24px;
    }

    .hero-wrap {
      padding: 10px 8px 10px;
    }

    .hero-card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0,0,0,.10);
      border: 2px solid #d9e2ec;
    }

    .hero-img {
      display: block;
      width: 100%;
      height: auto;
    }

    .board-wrap {
      padding: 0 8px 18px;
    }

    .board-window {
      background: #dfe8f2;
      border: 3px solid #bfd0e2;
      border-radius: 22px;
      padding: 10px;
      min-height: 60vh;
      box-shadow: inset 0 2px 8px rgba(0,0,0,.08);
    }

    .card {
      background: #fff;
      margin: 0 0 18px 0;
      border-radius: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,.08);
      overflow: hidden;
      border: 2px solid #d9e2ec;
    }

    .latest {
      outline: 6px solid #ffd84d;
    }

    .badge {
      display: inline-block;
      margin: 16px 16px 0;
      background: #e8f1ff;
      color: #1c4c94;
      font-size: 18px;
      font-weight: 900;
      padding: 10px 16px;
      border-radius: 999px;
    }

    .meta {
      padding: 16px 16px 0;
    }

    .date {
      display: inline-block;
      background: #eef4ff;
      color: #1f4d95;
      font-size: 18px;
      font-weight: 900;
      padding: 8px 14px;
      border-radius: 999px;
      margin: 0 10px 10px 0;
      line-height: 1.5;
    }

    .title {
      padding: 8px 16px 0;
      font-size: 30px;
      line-height: 1.5;
      font-weight: 900;
      color: #163556;
      white-space: pre-wrap;
    }

    .media-wrap {
      padding: 10px 8px 0;
      display: flex;
      justify-content: center;
    }

    .imgbox {
      background: #e8eef5;
      line-height: 0;
      width: 100%;
      border-radius: 18px;
      overflow: hidden;
      border: 2px solid #d9e2ec;
    }

    .mainimg {
      display: block;
      width: 100%;
      height: auto;
    }

    .video-box {
      background: #000;
      border-radius: 18px;
      overflow: hidden;
      border: 2px solid #d9e2ec;
      width: 100%;
      max-width: 560px;
    }

    .ratio916 {
      position: relative;
      width: 100%;
      padding-top: 177.78%;
      background: #000;
    }

    .ratio916 iframe,
    .ratio916 video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    .detail {
      padding: 22px 16px 20px;
      font-size: 32px;
      line-height: 1.8;
      font-weight: 900;
      color: #1f2f40;
      white-space: pre-wrap;
    }

    .btnrow {
      padding: 0 16px 22px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 84px;
      padding: 14px 24px;
      border-radius: 16px;
      font-size: 28px;
      font-weight: 900;
      text-decoration: none;
      border: none;
      box-sizing: border-box;
      text-align: center;
      line-height: 1.5;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-main {
      background: #2757a5;
      color: #fff;
      flex: 1 1 240px;
    }

    .btn-sub {
      background: #eef3f8;
      color: #1a3658;
      border: 2px solid #d3dce7;
      flex: 1 1 180px;
    }

    .empty {
      background: #fff;
      border-radius: 20px;
      border: 2px dashed #d6e1ed;
      padding: 30px 20px;
      font-size: 30px;
      line-height: 1.8;
      font-weight: 900;
      color: #607487;
    }

    .error-box {
      background: #fff3f3;
      color: #9b1c1c;
      border: 2px solid #f3c2c2;
      border-radius: 18px;
      padding: 20px;
      font-size: 24px;
      font-weight: 900;
      line-height: 1.7;
      margin: 8px;
      white-space: pre-wrap;
    }

    .loading {
      background: #fff;
      border-radius: 20px;
      border: 2px solid #d9e2ec;
      padding: 30px 20px;
      font-size: 28px;
      font-weight: 900;
      color: #35506b;
      line-height: 1.8;
      text-align: center;
    }

    .lead-wrap {
      padding: 8px 10px 6px;
    }

    .lead-title {
      font-size: 40px;
      line-height: 1.45;
      font-weight: 900;
      color: #0f2e52;
      margin: 0 0 8px 0;
      word-break: keep-all;
    }

    .lead-text {
      font-size: 30px;
      line-height: 1.95;
      font-weight: 900;
      color: #35506b;
      margin: 0;
    }

    .c-card {
      background: #fff;
      margin: 10px 8px 18px;
      border-radius: 22px;
      box-shadow: 0 4px 14px rgba(0,0,0,.08);
      border: 2px solid #d9e2ec;
      overflow: hidden;
    }

    .c-head {
      background: #2757a5;
      color: #fff;
      padding: 20px 16px;
      text-align: center;
      font-size: 40px;
      font-weight: 900;
      line-height: 1.45;
    }

    .c-sub {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.8;
      margin-top: 8px;
      opacity: .98;
    }

    .c-body {
      padding: 18px 16px 22px;
    }

    .label {
      font-size: 26px;
      line-height: 1.8;
      font-weight: 900;
      color: #35506b;
      margin: 0 0 10px 0;
    }

    .textarea {
      width: 100%;
      min-height: 190px;
      border: 4px solid #cfd9e6;
      border-radius: 18px;
      padding: 18px;
      font-size: 34px;
      color: #000;
      box-sizing: border-box;
      resize: vertical;
      outline: none;
      background: #fff;
      line-height: 1.8;
      font-family: inherit;
    }

    .textarea::placeholder {
      color: #9aa7b4;
      font-size: 30px;
    }

    .textarea:focus {
      border-color: #2f5ca8;
      box-shadow: 0 0 10px rgba(47,92,168,.22);
    }

    .hint {
      margin-top: 12px;
      font-size: 28px;
      line-height: 1.9;
      font-weight: 900;
      color: #5b6f84;
    }

    .result {
      display: none;
      background: #fff;
      margin: 0 8px 18px;
      border-radius: 22px;
      box-shadow: 0 4px 14px rgba(0,0,0,.08);
      border: 2px solid #d9e2ec;
      overflow: hidden;
    }

    .result.show {
      display: block;
    }

    .result-head {
      background: #eef4ff;
      color: #1f4d95;
      padding: 18px 16px;
      font-size: 34px;
      font-weight: 900;
      line-height: 1.45;
      border-bottom: 2px solid #d7e3f7;
    }

    .section {
      padding: 18px 16px;
      border-bottom: 2px solid #eef3f8;
    }

    .section:last-child {
      border-bottom: none;
    }

    .section-title {
      font-size: 28px;
      font-weight: 900;
      color: #4f6276;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .section-text {
      font-size: 34px;
      line-height: 2.0;
      font-weight: 900;
      color: #1f2f40;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .soft-box {
      background: #f1f6ff;
      border: 2px solid #d5e4ff;
      border-radius: 18px;
      padding: 18px 16px;
    }

    .action-area {
      padding: 18px 16px 22px;
      background: #fff;
    }

    @media (max-width: 640px) {
      .title { font-size: 26px; }
      .detail { font-size: 24px; }
      .btn { font-size: 24px; min-height: 78px; }
      .date, .badge { font-size: 16px; }
      .video-box { max-width: 520px; }
      .lead-title { font-size: 34px; }
      .lead-text { font-size: 24px; }
      .c-head { font-size: 34px; }
      .c-sub { font-size: 22px; }
      .label { font-size: 22px; }
      .textarea { font-size: 28px; min-height: 170px; }
      .textarea::placeholder { font-size: 24px; }
      .hint { font-size: 24px; }
      .result-head { font-size: 30px; }
      .section-title { font-size: 24px; }
      .section-text { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero-wrap">
      <div class="hero-card">
        <img class="hero-img" src="https://drive.google.com/thumbnail?id=1TBBGsm6XypE701Q6guwWm5RcuCUx5_s_&sz=w1600" alt="志木市デジタル回覧板">
      </div>
    </div>

    <div class="board-wrap">
      <div id="boardWindow" class="board-window">
        <div class="loading">読み込み中です...</div>
      </div>
    </div>

    <div class="hero-wrap">
      <div class="hero-card">
        <img class="hero-img" src="https://drive.google.com/thumbnail?id=15TLn-8XevnHqPIvSIt5hu2yuuRgwviYz&sz=w1600" alt="志木市役所AIコンシェルジュ">
      </div>
    </div>

    <div class="lead-wrap">
      <h1 class="lead-title">志木市役所AIコンシェルジュ</h1>
      <p class="lead-text">困っていることを書くと、何の案内か、どこの担当か、まず何をすればよいかを分かりやすく案内します。</p>
    </div>

    <div class="c-card">
      <div class="c-head">
        調べたいことを書く
        <div class="c-sub">困っていることをそのまま書いてください</div>
      </div>
      <div class="c-body">
        <p class="label">例：住民票が欲しいです / 水道料金の支払い方法を知りたい / 粗大ごみの出し方を知りたい</p>
        <textarea id="query" class="textarea" placeholder="ここに困っていることを書いてください"></textarea>
        <div class="hint">AIが整理して、この画面の中でまず分かるように案内します。まだ不安な時だけ電話し、もっと詳しいことは公式ページを見ます。</div>
        <div class="btnrow">
          <button id="askBtn" class="btn btn-main" type="button">相談する</button>
          <button id="resetBtn" class="btn btn-sub" type="button">消す</button>
        </div>
      </div>
    </div>

    <div id="resultBox" class="result">
      <div class="result-head">案内結果</div>

      <div class="section">
        <div class="section-title">相談の要約</div>
        <div id="summaryText" class="section-text"></div>
      </div>

      <div class="section">
        <div class="section-title">担当</div>
        <div id="departmentText" class="section-text"></div>
      </div>

      <div class="section">
        <div class="section-title">最初の一歩</div>
        <div class="soft-box">
          <div id="firstStepText" class="section-text"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">くわしい案内</div>
        <div id="guideText" class="section-text"></div>
      </div>

      <div class="section">
        <div class="section-title">急ぎ度</div>
        <div id="urgencyText" class="section-text"></div>
      </div>

      <div class="action-area">
        <div id="actionButtons" class="btnrow"></div>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxI0baFN17p2rSyjUELidzMc_j2X_gFmoOvOo6aVbGhTBy9iO5imM77wiW7jib3DOuE/exec';
    const FALLBACK_PHONE = '048-473-1111';

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function nl2br(str) {
      return escapeHtml(str).replace(/\n/g, '<br>');
    }

    function formatDateJP(value) {
      if (!value) return '';
      const d = new Date(value);
      if (isNaN(d.getTime())) return String(value);
      const y = d.getFullYear();
      const m = d.getMonth() + 1;
      const day = d.getDate();
      return `${y}年${m}月${day}日`;
    }

    function extractYouTubeId(url) {
      const s = String(url || '').trim();
      if (!s) return '';
      let m = s.match(/[?&]v=([a-zA-Z0-9_-]{6,})/);
      if (m && m[1]) return m[1];
      m = s.match(/youtu\.be\/([a-zA-Z0-9_-]{6,})/);
      if (m && m[1]) return m[1];
      m = s.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{6,})/);
      if (m && m[1]) return m[1];
      m = s.match(/youtube\.com\/shorts\/([a-zA-Z0-9_-]{6,})/);
      if (m && m[1]) return m[1];
      return '';
    }

    function extractDriveId(url) {
      const s = String(url || '').trim();
      if (!s) return '';
      let m = s.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
      if (m && m[1]) return m[1];
      m = s.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      if (m && m[1]) return m[1];
      return '';
    }

    function isDirectVideoUrl(url) {
      const s = String(url || '').trim().toLowerCase();
      return s.includes('.mp4') || s.includes('.mov') || s.includes('.m4v') || s.includes('.webm') || s.includes('.ogg');
    }

    function buildMediaHtml(item) {
      const mediaUrl = item.mediaUrl || '';
      if (!mediaUrl) return '';

      const yt = extractYouTubeId(mediaUrl);
      if (yt) {
        return `
          <div class="media-wrap">
            <div class="video-box">
              <div class="ratio916">
                <iframe
                  src="https://www.youtube.com/embed/${escapeHtml(yt)}?playsinline=1&rel=0"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  allowfullscreen>
                </iframe>
              </div>
            </div>
          </div>
        `;
      }

      const driveId = extractDriveId(mediaUrl);
      if (driveId) {
        const previewUrl = `https://drive.google.com/file/d/${driveId}/preview`;
        return `
          <div class="media-wrap">
            <div class="video-box">
              <div class="ratio916">
                <iframe
                  src="${escapeHtml(previewUrl)}"
                  allow="autoplay"
                  allowfullscreen>
                </iframe>
              </div>
            </div>
          </div>
        `;
      }

      if (isDirectVideoUrl(mediaUrl)) {
        return `
          <div class="media-wrap">
            <div class="video-box">
              <div class="ratio916">
                <video controls playsinline preload="metadata" src="${escapeHtml(mediaUrl)}"></video>
              </div>
            </div>
          </div>
        `;
      }

      return '';
    }

    function buildImageHtml(item) {
      if (!item.imageUrl) return '';
      return `
        <div class="media-wrap">
          <div class="imgbox">
            <img class="mainimg" src="${escapeHtml(item.imageUrl)}" alt="掲示板画像">
          </div>
        </div>
      `;
    }

    function buildButtonsHtml(item) {
      let html = '';
      if (item.applyUrl) {
        html += `<a href="${escapeHtml(item.applyUrl)}" class="btn btn-main" target="_blank" rel="noopener noreferrer">タップして申込みフォームへ</a>`;
      }
      if (item.homeUrl) {
        html += `<a href="${escapeHtml(item.homeUrl)}" class="btn btn-sub" target="_blank" rel="noopener noreferrer">タップして詳細を見る（公式ページへ）</a>`;
      }
      return html ? `<div class="btnrow">${html}</div>` : '';
    }

    function buildCard(item, isLatest) {
      return `
        <div class="card ${isLatest ? 'latest' : ''}">
          ${isLatest ? '<div class="badge">最新のお知らせ</div>' : ''}
          <div class="meta">
            ${item.date ? `<span class="date">${escapeHtml(formatDateJP(item.date))}</span>` : ''}
          </div>
          ${item.title ? `<div class="title">${nl2br(item.title)}</div>` : ''}
          ${buildMediaHtml(item) || buildImageHtml(item)}
          ${item.detail ? `<div class="detail">${nl2br(item.detail)}</div>` : ''}
          ${buildButtonsHtml(item)}
        </div>
      `;
    }

    async function loadBoard() {
      const boardWindow = document.getElementById('boardWindow');

      try {
        const res = await fetch(`${GAS_URL}?mode=board`, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'データ取得に失敗しました。');

        const items = Array.isArray(data.items) ? data.items : [];

        if (items.length === 0) {
          boardWindow.innerHTML = '<div class="empty">表示できるお知らせがまだありません。</div>';
          return;
        }

        boardWindow.innerHTML = items.map((item, idx) => buildCard(item, idx === 0)).join('');
      } catch (err) {
        boardWindow.innerHTML = `<div class="error-box">読み込みに失敗しました。\n${escapeHtml(err.message || String(err))}</div>`;
      }
    }

    async function askConcierge() {
      const queryEl = document.getElementById('query');
      const askBtn = document.getElementById('askBtn');
      const resultBox = document.getElementById('resultBox');
      const query = queryEl.value.trim();

      if (!query) return;

      resultBox.classList.add('show');
      document.getElementById('summaryText').textContent = '確認しています...';
      document.getElementById('departmentText').textContent = '';
      document.getElementById('firstStepText').textContent = '';
      document.getElementById('guideText').textContent = '';
      document.getElementById('urgencyText').textContent = '';
      document.getElementById('actionButtons').innerHTML = '';

      askBtn.disabled = true;
      askBtn.textContent = '確認中...';

      try {
        const url = `${GAS_URL}?mode=concierge&query=${encodeURIComponent(query)}`;
        const res = await fetch(url, { cache: 'no-store' });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        if (!data.ok) throw new Error(data.error || '案内に失敗しました。');

        document.getElementById('summaryText').textContent = data.summary || '';
        document.getElementById('departmentText').textContent = data.department || '';
        document.getElementById('firstStepText').textContent = data.first_step || '';
        document.getElementById('guideText').textContent = data.guide || '';
        document.getElementById('urgencyText').textContent = data.urgency || '通常';

        const phone = data.phone || FALLBACK_PHONE;
        const digits = phone.replace(/[^0-9]/g, '');
        let buttons = `<a class="btn btn-main" href="tel:${digits}">タップして電話する</a>`;

        if (data.url) {
          buttons += `<a class="btn btn-sub" href="${escapeHtml(data.url)}" target="_blank" rel="noopener noreferrer">タップして詳細を見る（公式ページへ）</a>`;
        }

        document.getElementById('actionButtons').innerHTML = buttons;
      } catch (err) {
        document.getElementById('summaryText').textContent = err.message || String(err);
      } finally {
        askBtn.disabled = false;
        askBtn.textContent = '相談する';
      }
    }

    function resetConcierge() {
      document.getElementById('query').value = '';
      document.getElementById('resultBox').classList.remove('show');
      document.getElementById('summaryText').textContent = '';
      document.getElementById('departmentText').textContent = '';
      document.getElementById('firstStepText').textContent = '';
      document.getElementById('guideText').textContent = '';
      document.getElementById('urgencyText').textContent = '';
      document.getElementById('actionButtons').innerHTML = '';
    }

    document.getElementById('askBtn').addEventListener('click', askConcierge);
    document.getElementById('resetBtn').addEventListener('click', resetConcierge);

    loadBoard();
  </script>
</body>
</html>
