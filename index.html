<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>志木お助け隊DX 統合版</title>
<style>
/* 共通スタイル：デザインは一切変えていません */
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  background:#eef5fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}
.page{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:14px;
}
.banner{
  width:100%;
  border-radius:18px;
  overflow:hidden;
  background:#dfeaf6;
  box-shadow:0 6px 18px rgba(20,70,120,.14);
  margin-bottom:18px;
}
.banner img{
  width:100%;
  display:block;
}
.card{
  background:#fff;
  border-radius:24px;
  padding:24px 18px;
  box-shadow:0 6px 18px rgba(20,70,120,.12);
  text-align:center;
  margin-bottom: 20px;
}
.title{
  font-size:30px;
  font-weight:900;
  color:#134477;
  margin:0 0 10px;
}
.sub{
  font-size:20px;
  font-weight:700;
  color:#49657f;
  margin:0 0 22px;
}
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:72px;
  border-radius:20px;
  color:#fff;
  font-size:25px;
  font-weight:900;
  text-decoration:none;
  margin:16px 0;
  box-shadow:0 7px 16px rgba(0,0,0,.18);
  border:none;
  cursor:pointer;
}
.blue{background:linear-gradient(135deg,#2f80ed,#1c73c9)}
.green{background:linear-gradient(135deg,#27ae60,#1aa56c)}
.gray{background:linear-gradient(135deg,#666,#444)}
.note{
  margin-top:20px;
  font-size:17px;
  line-height:1.7;
  color:#607488;
}
textarea{
  width:100%;
  height:130px;
  border:2px solid #d7dce3;
  border-radius:18px;
  padding:16px;
  font-size:18px;
  margin-bottom:10px;
}

/* ページ切り替え用表示制御 */
.section-content { display: none; }
.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
</style>
</head>
<body>

<div class="page">

  <!-- ========================= TOP画面 ========================= -->
  <div id="view-home" class="section-content active">
    <div class="banner">
      <img src="https://drive.google.com/thumbnail?id=1e6vAa1Y0oOvOlAwpgHaSvqm5mZHEEWaH&sz=w2000" alt="TOP">
    </div>
    <div class="card">
      <h1 class="title">志木お助け隊DX</h1>
      <p class="sub">見たいページを選んでください</p>
      <button class="btn blue" onclick="changeView('board')">回覧板を見る</button>
      <button class="btn green" onclick="changeView('concierge')">AIコンシェルジュを使う</button>
      <div class="note">市からのお知らせと、暮らしの相談先を<br>わかりやすく案内します。</div>
    </div>
  </div>

  <!-- ========================= 回覧板画面 ========================= -->
  <div id="view-board" class="section-content">
    <div class="banner">
      <img src="https://drive.google.com/thumbnail?id=1HhzMcMDxsz5O_TVsux2Ycz2TvQMY4UTT&sz=w2000" alt="回覧板">
    </div>
    <button class="btn gray" onclick="changeView('home')">トップに戻る</button>
    <div class="card">
      <h1 class="title">回覧板</h1>
      <div id="board-items">
        <p class="note">最新のお知らせを読み込み中...</p>
        <!-- ここにお知らせが表示されます -->
        <div style="text-align:left; border:1px solid #ddd; padding:15px; border-radius:15px; margin-top:10px;">
          <div style="color:#666; font-size:14px;">2026/05/01</div>
          <div style="font-weight:bold; font-size:18px;">GitHub Pages版が起動しました</div>
          <p style="font-size:15px;">※実際のお知らせはGoogleスプレッドシートのデータをここに反映させる設定が必要です。</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ========================= コンシェルジュ画面 ========================= -->
  <div id="view-concierge" class="section-content">
    <div class="banner">
      <img src="https://drive.google.com/thumbnail?id=1q6NBKaTPNs0tskub_deePwNPb2u0xCYv&sz=w3000" alt="コンシェルジュ">
    </div>
    <button class="btn gray" onclick="changeView('home')">トップに戻る</button>
    <div class="card">
      <h1 class="title" style="color:#1a73e8">AIコンシェルジュ</h1>
      <div style="text-align:left; margin-bottom:10px; font-weight:bold;">ご相談内容を入力してください</div>
      <textarea id="msg" placeholder="例：洪水ハザードマップが見たい"></textarea>
      <button class="btn blue" onclick="mockAsk()">相談する</button>
      <div id="result" style="margin-top:20px; text-align:left; color:#1a73e8; font-weight:bold;"></div>
    </div>
  </div>

</div>

<script>
/**
 * 画面を切り替える関数
 */
function changeView(targetId) {
  // 全セクションを一旦非表示
  const sections = document.querySelectorAll('.section-content');
  sections.forEach(s => s.classList.remove('active'));

  // 指定したセクションを表示
  const target = document.getElementById('view-' + targetId);
  if(target) {
    target.classList.add('active');
    window.scrollTo(0, 0);
  }
}

/**
 * コンシェルジュ相談のダミー動作
 */
function mockAsk() {
  const msg = document.getElementById('msg').value;
  const res = document.getElementById('result');
  if(!msg) {
    res.innerText = "相談内容を入力してください。";
    return;
  }
  res.innerText = "「" + msg + "」について確認しています...";
  setTimeout(() => {
    res.innerHTML = "<div style='color:#333; font-weight:normal; border-top:1px solid #eee; padding-top:10px;'>近い案内が見つかりませんでした。志木市役所（048-473-1111）へ直接ご相談いただくか、別のキーワードで入力してください。</div>";
  }, 1000);
}
</script>

</body>
</html>
