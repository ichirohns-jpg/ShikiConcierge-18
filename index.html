<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>志木お助け隊DX</title>
<style>
/* ===== デザインは一切変えず、動作のみを追加 ===== */
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  background:#eef5fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}
.page{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:14px;
}
.banner{
  width:100%;
  border-radius:18px;
  overflow:hidden;
  background:#dfeaf6;
  box-shadow:0 6px 18px rgba(20,70,120,.14);
  margin-bottom:18px;
}
.banner img{
  width:100%;
  display:block;
}
.card{
  background:#fff;
  border-radius:24px;
  padding:24px 18px;
  box-shadow:0 6px 18px rgba(20,70,120,.12);
  text-align:center;
}
.title{
  font-size:30px;
  font-weight:900;
  color:#134477;
  margin:0 0 10px;
}
.sub{
  font-size:20px;
  font-weight:700;
  color:#49657f;
  margin:0 0 22px;
}
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:72px;
  border-radius:20px;
  color:#fff;
  font-size:25px;
  font-weight:900;
  text-decoration:none;
  margin:16px 0;
  box-shadow:0 7px 16px rgba(0,0,0,.18);
  border:none;
  cursor:pointer;
}
.blue{background:linear-gradient(135deg,#2f80ed,#1c73c9)}
.green{background:linear-gradient(135deg,#27ae60,#1aa56c)}
.gray{background:linear-gradient(135deg,#666,#444)}
.note{
  margin-top:20px;
  font-size:17px;
  line-height:1.7;
  color:#607488;
}

/* 表示・非表示の切り替え用 */
.content-section { display: none; }
.active { display: block; }

textarea {
  width:100%;
  height:130px;
  border:2px solid #d7dce3;
  border-radius:18px;
  padding:16px;
  font-size:18px;
  margin-bottom:10px;
}
</style>
</head>
<body>

<div class="page">

  <!-- ========================= TOP画面 ========================= -->
  <div id="section-home" class="content-section active">
    <div class="banner">
      <img src="https://drive.google.com/thumbnail?id=1e6vAa1Y0oOvOlAwpgHaSvqm5mZHEEWaH&sz=w2000" alt="志木お助け隊DX">
    </div>
    <div class="card">
      <h1 class="title">志木お助け隊DX</h1>
      <p class="sub">見たいページを選んでください</p>
      <button class="btn blue" onclick="showSection('board')">回覧板を見る</button>
      <button class="btn green" onclick="showSection('concierge')">AIコンシェルジュを使う</button>
      <div class="note">市からのお知らせと、暮らしの相談先を<br>わかりやすく案内します。</div>
    </div>
  </div>

  <!-- ========================= 回覧板画面 ========================= -->
  <div id="section-board" class="content-section">
    <div class="banner">
      <img src="https://drive.google.com/thumbnail?id=1HhzMcMDxsz5O_TVsux2Ycz2TvQMY4UTT&sz=w2000" alt="回覧板">
    </div>
    <button class="btn gray" onclick="showSection('home')">トップに戻る</button>
    <div class="card">
      <h2 class="title">回覧板</h2>
      <p class="sub">最新のお知らせ</p>
      <div id="board-items" style="text-align:left;">
        <p>※スプレッドシート連携を準備中です。</p>
      </div>
    </div>
  </div>

  <!-- ========================= コンシェルジュ画面 ========================= -->
  <div id="section-concierge" class="content-section">
    <div class="banner">
      <img src="https://drive.google.com/thumbnail?id=1q6NBKaTPNs0tskub_deePwNPb2u0xCYv&sz=w3000" alt="コンシェルジュ">
    </div>
    <button class="btn gray" onclick="showSection('home')">トップに戻る</button>
    <div class="card">
      <h2 class="title" style="color:#1a73e8">AIコンシェルジュ</h2>
      <div style="text-align:left; margin-bottom:10px; font-weight:bold;">ご相談内容を入力してください</div>
      <textarea id="msg" placeholder="例：洪水ハザードマップが見たい"></textarea>
      <button class="btn blue" onclick="alert('相談機能を準備中です')">相談する</button>
    </div>
  </div>

</div>

<script>
/**
 * 画面切り替えの仕組み
 */
function showSection(sectionId) {
  // すべてのセクションを隠す
  var sections = document.querySelectorAll('.content-section');
  sections.forEach(function(sec) {
    sec.classList.remove('active');
  });

  // 指定されたセクションだけ表示する
  var target = document.getElementById('section-' + sectionId);
  if (target) {
    target.classList.add('active');
    window.scrollTo(0, 0); // 画面の一番上に戻す
  }
}
</script>

</body>
</html>
