<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>志木お助け隊</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #eef5fb;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    }
    .box {
      padding: 32px 18px;
      text-align: center;
      color: #173f6d;
    }
    .title {
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 18px;
    }
    .text {
      font-size: 20px;
      line-height: 1.7;
      margin-bottom: 24px;
    }
    .btn {
      display: block;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 18px;
      border-radius: 16px;
      background: #1c73c9;
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      text-decoration: none;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="title">志木お助け隊を開いています</div>
    <div class="text">自動で開かない場合は、下のボタンを押してください。</div>
    <a class="btn" id="openBtn" href="#">志木お助け隊を開く</a>
  </div>
  <script>
    var GAS_URL = "https://script.google.com/macros/s/AKfycbwvLcbEtK-bnoJpLCgthbbSPp8j-Lq2pKxs3waU4IZv-hmzJUGQqm3x3oPUs8SuajE-iA/exec";
    var finalUrl = GAS_URL + (GAS_URL.indexOf('?') === -1 ? '?' : '&') + 't=' + new Date().getTime();
    document.getElementById("openBtn").href = finalUrl;
    window.location.replace(finalUrl);
  </script>
</body>
</html>
