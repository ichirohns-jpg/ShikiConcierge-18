<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>志木お助け隊</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #eef5fb;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      overflow: hidden;
    }

    .app {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background: #eef5fb;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #eef5fb;
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eef5fb;
      color: #134477;
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      padding: 24px;
    }

    .open-button {
      position: fixed;
      right: 14px;
      bottom: calc(14px + env(safe-area-inset-bottom));
      z-index: 20;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 12px 16px;
      border-radius: 999px;
      background: #1c73c9;
      color: #ffffff;
      font-size: 17px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 4px 14px rgba(28, 115, 201, 0.28);
    }
  </style>
</head>

<body>
  <div class="app">
    <div id="loading" class="loading">読み込み中です…</div>
    <iframe id="gasFrame" title="志木お助け隊"></iframe>
    <a id="openButton" class="open-button" target="_blank" rel="noopener">開く</a>
  </div>

  <script>
    const GAS_APP_URL = 'ここにGASのウェブアプリURLを入れる';

    const frame = document.getElementById('gasFrame');
    const loading = document.getElementById('loading');
    const openButton = document.getElementById('openButton');

    frame.src = GAS_APP_URL;
    openButton.href = GAS_APP_URL;

    frame.addEventListener('load', function () {
      loading.style.display = 'none';
    });

    setTimeout(function () {
      loading.style.display = 'none';
    }, 5000);
  </script>
</body>
</html>
