<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>志木お助け隊</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #eef5fb;
      color: #1d2a38;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .box {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border: 1px solid #d7e4f2;
      border-radius: 22px;
      padding: 30px 22px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(16, 56, 96, 0.16);
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 30px;
      line-height: 1.4;
      color: #134477;
      font-weight: 900;
    }

    p {
      margin: 0 0 24px;
      font-size: 21px;
      line-height: 1.7;
      color: #385779;
      font-weight: 700;
    }

    a {
      display: block;
      width: 100%;
      padding: 18px 14px;
      border-radius: 16px;
      background: #1c73c9;
      color: #ffffff;
      font-size: 22px;
      line-height: 1.4;
      font-weight: 900;
      text-decoration: none;
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>志木お助け隊</h1>
    <p>最新ページを開いています。</p>
    <a id="openLink" href="#">開かない場合はこちら</a>
  </div>

  <script>
    const GAS_EXEC_URL = "https://script.google.com/macros/s/AKfycbz-cnevx8-W9ukZ3Nsk5Kgkv7Ldacrlw1FrNqH6nHiZ2mdxpp0WIndWGTJ-l-KRKtPtQw/exec";

    const freshUrl = GAS_EXEC_URL + "?v=" + Date.now();

    document.getElementById("openLink").href = freshUrl;

    setTimeout(function () {
      window.location.replace(freshUrl);
    }, 300);
  </script>
</body>
</html>
