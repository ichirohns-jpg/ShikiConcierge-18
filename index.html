<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>志木お助け隊</title>

  <script>
    const GAS_EXEC_URL = 'ここにGASのウェブアプリURLを入れる';

    if (!GAS_EXEC_URL.includes('ここに')) {
      window.location.replace(GAS_EXEC_URL);
    }
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #eef5fb;
      color: #1d2a38;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .box {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 22px;
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(16, 56, 96, 0.16);
      border: 1px solid #d7e4f2;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 30px;
      line-height: 1.4;
      color: #134477;
      font-weight: 900;
    }

    p {
      margin: 0 0 22px;
      font-size: 21px;
      line-height: 1.7;
      color: #385779;
      font-weight: 700;
    }

    a {
      display: block;
      width: 100%;
      padding: 17px 14px;
      border-radius: 16px;
      background: #1c73c9;
      color: #ffffff;
      font-size: 22px;
      line-height: 1.4;
      font-weight: 900;
      text-decoration: none;
    }

    .note {
      margin-top: 16px;
      font-size: 17px;
      line-height: 1.6;
      color: #66788f;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>志木お助け隊</h1>
    <p>デジタル回覧板とAIコンシェルジュを開きます。</p>
    <a id="openLink" href="#">ページを開く</a>
    <div class="note">自動で開かない場合は、上のボタンを押してください。</div>
  </div>

  <script>
    const link = document.getElementById('openLink');

    if (GAS_EXEC_URL.includes('ここに')) {
      link.href = '#';
      link.textContent = 'GASのURLを入れてください';
    } else {
      link.href = GAS_EXEC_URL;
    }
  </script>
</body>
</html>
