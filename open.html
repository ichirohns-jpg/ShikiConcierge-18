<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>志木お助け隊DX</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  background:linear-gradient(180deg,#eaf6ff,#ffffff);
  color:#17324d;
}

.wrap{
  max-width:640px;
  margin:0 auto;
  padding:20px 16px 30px;
}

/* 上の画像 */
.hero{
  background:#fff;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 10px 28px rgba(20,70,120,.18);
}

.hero img{
  width:100%;
  display:block;
}

/* 本体カード */
.card{
  margin-top:16px;
  background:#fff;
  border-radius:28px;
  padding:28px 20px 30px;
  text-align:center;
  box-shadow:0 10px 28px rgba(20,70,120,.16);
}

.badge{
  display:inline-block;
  padding:6px 14px;
  border-radius:999px;
  background:#e8f4ff;
  color:#0d63a5;
  font-size:14px;
  font-weight:900;
  margin-bottom:10px;
}

h1{
  margin:0 0 10px;
  font-size:32px;
  font-weight:900;
  color:#0d4778;
}

.lead{
  font-size:18px;
  line-height:1.6;
  font-weight:700;
  margin-bottom:22px;
}

/* ボタン */
.btn{
  display:block;
  width:100%;
  padding:20px 14px;
  border-radius:20px;
  text-decoration:none;
  color:#fff;
  font-size:22px;
  font-weight:900;
  margin-top:14px;
  box-shadow:0 6px 16px rgba(0,0,0,.15);
}

/* 色 */
.board{
  background:linear-gradient(135deg,#1687e0,#0d5fa8);
}

.ai{
  background:linear-gradient(135deg,#3bbf6b,#20884b);
}

.sub{
  display:block;
  margin-top:6px;
  font-size:13px;
  font-weight:700;
}

/* 説明 */
.note{
  margin-top:20px;
  padding:14px;
  border-radius:16px;
  background:#f5f9fc;
  font-size:14px;
  line-height:1.6;
  text-align:left;
}
</style>

</head>

<body>

<div class="wrap">

  <!-- 上の大きい画像 -->
  <div class="hero">
    <img src="ogp.png" alt="志木お助け隊DX">
  </div>

  <!-- 本体 -->
  <div class="card">

    <div class="badge">志木市の便利サービス</div>

    <h1>志木お助け隊DX</h1>

    <p class="lead">
      回覧板とAI相談を<br>
      ひとつにまとめた入口です
    </p>

    <!-- 回覧板 -->
    <a class="btn board"
    href="https://script.google.com/macros/s/AKfycbwRlMqXPplCyWzKv7vRAywWnava0cYPIK1TQh6uIQ0hnKSonaJqc4K4RVgWgHJc6Uo/exec">
      回覧板を見る
      <span class="sub">市からのお知らせを見る</span>
    </a>

    <!-- AI -->
    <a class="btn ai"
    href="https://script.google.com/macros/s/AKfycbzhTd6DoEUjEYSY_ADQkjYC97fHdUUz4kEZ_cKFWoJGBYA-LCUBy85_7rBVqYBepWR9BA/exec">
      AIコンシェルジュ
      <span class="sub">相談先をすぐ探す</span>
    </a>

    <div class="note">
      ・回覧板 → 市のお知らせを見る<br>
      ・AIコンシェルジュ → 困りごとの相談先を探す
    </div>

  </div>

</div>

</body>
</html>
