      <p>市では、かけがえのないいのちを守るため、市民が互いにこころのサインに気づくまちを目指し、5月7日（木）から14日（木）までの1週間を「志木市こころの安全週間」と定めています。新年度が始まり、新しい生活に慣れようとするこの時期は、プレッシャーや不安で体だけでなくこころも疲れてしまうことがあります。「大丈夫」と思って無理をせず、誰かに気持ちを話してみませんか。さまざまな相談先がありますので、この機会に自身のこころの健康に目を向けてみましょう。詳しくは市ホームページをご覧ください。</p>
